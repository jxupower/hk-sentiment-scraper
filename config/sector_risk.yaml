# Sector / theme risk overrides — informational flags only, NOT disqualifiers.
# Stocks listed here keep their factor percentile ranks but the Discovery tab
# surfaces a warning badge so the user knows a known macro / regulatory issue
# may be distorting valuation. Add new flags by appending to `flags:`.
#
# Schema:
#   id        — short slug for log/debug
#   label     — short user-visible warning text
#   tickers   — list of ".HK" tickers covered
#   severity  — "high" | "medium" | "low" — controls badge color
#
# Update this file freely. Reloaded on every Discovery callback (no restart needed).

