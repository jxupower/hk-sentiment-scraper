feeds:
  # General Asia/China business news — broad coverage
  - name: South China Morning Post Business
    url: https://www.scmp.com/rss/91/feed
  - name: Bloomberg Markets
    url: https://feeds.bloomberg.com/markets/news.rss
  - name: CNBC Asia
    url: https://www.cnbc.com/id/100727362/device/rss/rss.html

  # Broad Google News queries — designed to surface stories that name HK / China
  # listed companies. The TickerMatcher decides which tickers each article is about,
  # so feeds intentionally avoid being per-sector.
  - name: Google News - Hong Kong stock market
    url: https://news.google.com/rss/search?q=%22Hong+Kong+stock%22+OR+%22Hang+Seng%22+OR+HKEX&hl=en-US&gl=US&ceid=US:en
  - name: Google News - China equities macro
    url: https://news.google.com/rss/search?q=%22China+stocks%22+OR+%22Chinese+equities%22+OR+%22China+economy%22&hl=en-US&gl=US&ceid=US:en
  - name: Google News - China earnings results
    url: https://news.google.com/rss/search?q=%22China%22+%22earnings%22+%22quarter%22+OR+%22revenue%22+OR+%22profit%22&hl=en-US&gl=US&ceid=US:en
  - name: Google News - China policy regulation
    url: https://news.google.com/rss/search?q=%22China%22+%22regulation%22+OR+%22policy%22+OR+%22PBOC%22+OR+%22stimulus%22&hl=en-US&gl=US&ceid=US:en
  - name: Google News - Stock Connect Northbound Southbound
    url: https://news.google.com/rss/search?q=%22Stock+Connect%22+OR+%22Northbound%22+OR+%22Southbound%22&hl=en-US&gl=US&ceid=US:en
  - name: Google News - China sectors broad
    url: https://news.google.com/rss/search?q=%22China+tech%22+OR+%22China+bank%22+OR+%22China+property%22+OR+%22China+consumer%22&hl=en-US&gl=US&ceid=US:en
