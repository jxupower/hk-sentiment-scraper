# Sub-sector taxonomy — finer-grained peer grouping than yf_sector.
#
# Loaded by `universe/reconciler.py` which writes the resolved values to
# `securities.sub_sector` and `securities.effective_sector`. Resolution
# order per ticker (first match wins):
#   1. Watchlist YAML's per-entry `sub_sector` field
#   2. `ticker_overrides[ticker].sub_sector`
#   3. `industry_to_subsector[yf_industry]`
#   4. NULL
#
# `effective_sector` (the parent sector after overrides) is resolved as:
#   1. `ticker_overrides[ticker].parent_sector`
#   2. else `watchlist_sector or yf_sector`
#
# Downstream consumers (analysis/factor_scores.py + analysis/peer_comparison.py)
# bucket by sub_sector first, falling back to effective_sector when sub_sector
# is NULL or the sub-sector has fewer than 5 names.

# ============================================================================
# industry_to_subsector — authoritative mapping from yfinance industry
# ============================================================================
# Covers the 12 yf_industry values present under yf_sector='Technology' in
# the HK universe. The merged buckets (Semiconductors & Equipment, Tech
# Components & Distribution, etc.) follow the locked plan in
# C:\Users\User\.claude\plans\wobbly-bouncing-spindle.md.

industry_to_subsector:
  Software - Application:                  Application Software
  Software - Infrastructure:               Platforms & Cloud Infrastructure
  Information Technology Services:         IT Services & Consulting
  Semiconductors:                          Semiconductors & Equipment
  Semiconductor Equipment & Materials:     Semiconductors & Equipment
  Consumer Electronics:                    Consumer Electronics & Devices
  Computer Hardware:                       Consumer Electronics & Devices
  Electronic Components:                   Tech Components & Distribution
  Scientific & Technical Instruments:      Tech Components & Distribution
  Electronics & Computer Distribution:     Tech Components & Distribution
  Communication Equipment:                 Telecom Equipment
  # Solar gets the "Clean Energy & Nuclear" sub-sector AND is moved out of
  # Technology entirely via the per-ticker overrides below. Uranium (mapped
  # under Energy below) folds into the same bucket since nuclear is low-carbon.
  Solar:                                   Clean Energy & Nuclear

  # ---- Industrials (12 sub-sectors covering all 25 yf_industry values) ----
  Engineering & Construction:              Engineering & Construction
  Building Products & Equipment:           Building Products & Equipment
  Specialty Industrial Machinery:          Industrial Machinery
  Farm & Heavy Construction Machinery:     Industrial Machinery
  Tools & Accessories:                     Industrial Machinery
  Electrical Equipment & Parts:            Electrical Equipment
  Metal Fabrication:                       Metal Fabrication
  Marine Shipping:                         Logistics & Freight
  Integrated Freight & Logistics:          Logistics & Freight
  Trucking:                                Logistics & Freight
  Airlines:                                Passenger & Air Transport
  Airports & Air Services:                 Passenger & Air Transport
  Railroads:                               Passenger & Air Transport
  Infrastructure Operations:               Infrastructure Operations
  Waste Management:                        Environmental Services
  Pollution & Treatment Controls:          Environmental Services
  Specialty Business Services:             Business & Professional Services
  Staffing & Employment Services:          Business & Professional Services
  Consulting Services:                     Business & Professional Services
  Security & Protection Services:          Business & Professional Services
  Business Equipment & Supplies:           Business & Professional Services
  Industrial Distribution:                 Business & Professional Services
  Rental & Leasing Services:               Business & Professional Services
  Conglomerates:                           Conglomerates
  Aerospace & Defense:                     Aerospace & Defense

  # ---- Consumer Cyclical (14 sub-sectors covering 23 yf_industry values) ----
  Restaurants:                             Restaurants
  Apparel Manufacturing:                   Apparel Manufacturing
  Textile Manufacturing:                   Textiles & Footwear
  Footwear & Accessories:                  Textiles & Footwear
  Apparel Retail:                          Apparel & Specialty Retail
  Specialty Retail:                        Apparel & Specialty Retail
  Department Stores:                       Apparel & Specialty Retail
  Luxury Goods:                            Luxury Goods
  Lodging:                                 Travel & Hospitality
  Travel Services:                         Travel & Hospitality
  Leisure:                                 Travel & Hospitality
  Resorts & Casinos:                       Gambling & Casinos
  Gambling:                                Gambling & Casinos
  Auto Manufacturers:                      Auto Manufacturers
  Auto Parts:                              Auto Parts & Suppliers
  Recreational Vehicles:                   Auto Parts & Suppliers
  Auto & Truck Dealerships:                Auto Dealerships
  Furnishings, Fixtures & Appliances:      Home Furnishings & Appliances
  Home Improvement Retail:                 Home Furnishings & Appliances
  Packaging & Containers:                  Packaging & Containers
  Internet Retail:                         Internet Retail
  Personal Services:                       Personal Services
  # Residential Construction maps to Engineering & Construction as a
  # fallback; the single HK ticker (3708.HK) is also fully promoted to
  # Industrials parent via the ticker_override below.
  Residential Construction:                Engineering & Construction

  # ---- Healthcare (7 sub-sectors covering 10 yf_industry values) ----
  Biotechnology:                            Biotechnology
  Drug Manufacturers - Specialty & Generic: Drug Manufacturing
  Drug Manufacturers - General:             Drug Manufacturing
  Medical Care Facilities:                  Medical Care Facilities
  Medical Devices:                          Medical Devices & Instruments
  Medical Instruments & Supplies:           Medical Devices & Instruments
  Pharmaceutical Retailers:                 Pharmacy Retail & Distribution
  Medical Distribution:                     Pharmacy Retail & Distribution
  Health Information Services:              Health Information Services
  Diagnostics & Research:                   Diagnostics & Research

  # ---- Financial Services (6 sub-sectors covering 12 yf_industry values) ----
  # Tiny yfinance buckets folded into adjacent ones (Mortgage Finance → Credit
  # Services; Financial Data & Stock Exchanges → Capital Markets; Insurance
  # Brokers + Reinsurance into the single Insurance bucket).
  Banks - Diversified:                     Banks
  Banks - Regional:                        Banks
  Capital Markets:                         Capital Markets
  Financial Data & Stock Exchanges:        Capital Markets
  Credit Services:                         Credit Services
  Mortgage Finance:                        Credit Services
  Asset Management:                        Asset Management
  Insurance - Life:                        Insurance
  Insurance - Property & Casualty:         Insurance
  Insurance Brokers:                       Insurance
  Insurance - Reinsurance:                 Insurance
  Financial Conglomerates:                 Financial Conglomerates

  # ---- Consumer Defensive (5 sub-sectors covering 11 yf_industry values) ----
  # Maximum-consolidation taxonomy per user choice. Confectioners + Tobacco
  # folded into Packaged Foods (both small, conceptually adjacent). All 3
  # Beverage sub-industries merged. All 3 food-chain sub-industries merged.
  Packaged Foods:                          Packaged Foods
  Confectioners:                           Packaged Foods
  Tobacco:                                 Packaged Foods
  Education & Training Services:           Education & Training Services
  Farm Products:                           Food Production, Distribution & Retail
  Food Distribution:                       Food Production, Distribution & Retail
  Grocery Stores:                          Food Production, Distribution & Retail
  Household & Personal Products:           Household & Personal Products
  Beverages - Non-Alcoholic:               Beverages
  Beverages - Wineries & Distilleries:     Beverages
  Beverages - Brewers:                     Beverages

  # ---- Communication Services (4 sub-sectors covering 7 yf_industry values) ----
  # Note: Tencent/Baidu/NetEase are promoted to Technology via ticker_overrides
  # below, so they leave the Comm Services effective count.
  Telecom Services:                        Telecom Services
  Internet Content & Information:          Internet Content & Gaming
  Electronic Gaming & Multimedia:          Internet Content & Gaming
  Entertainment:                           Media & Entertainment
  Publishing:                              Media & Entertainment
  Broadcasting:                            Media & Entertainment
  Advertising Agencies:                    Advertising Agencies

  # ---- Energy (3 sub-sectors covering all 8 yf_industry values) ----
  # All 6 Oil & Gas sub-industries collapse into one. Thermal Coal (Energy)
  # named distinctly from Coking Coal (Basic Materials — steel feedstock).
  # Uranium folded into Clean Energy & Nuclear (nuclear is low-carbon).
  # Solar tickers are already promoted from Technology to Energy/Clean Energy
  # via the ticker_overrides below.
  Oil & Gas Integrated:                    Oil & Gas
  Oil & Gas E&P:                           Oil & Gas
  Oil & Gas Refining & Marketing:          Oil & Gas
  Oil & Gas Midstream:                     Oil & Gas
  Oil & Gas Equipment & Services:          Oil & Gas
  Oil & Gas Drilling:                      Oil & Gas
  Thermal Coal:                            Thermal Coal
  Uranium:                                 Clean Energy & Nuclear

  # ---- Utilities (5 sub-sectors — 1:1 with yfinance, prefix dropped) ----
  # All buckets clear the 5-ticker floor on their own. Distinct regulatory
  # models (regulated rates vs merchant IPP) and fuel sources matter for
  # peer comparison, so no merges.
  Utilities - Regulated Electric:          Regulated Electric Utilities
  Utilities - Regulated Gas:               Regulated Gas Utilities
  Utilities - Regulated Water:             Regulated Water Utilities
  Utilities - Independent Power Producers: Independent Power Producers
  Utilities - Renewable:                   Renewable Utilities

  # ---- Real Estate (3 sub-sectors covering all 3 yf_industry values) ----
  # Cleanest 1:1 mapping in the universe — yfinance already gives us a clean
  # three-bucket split. Just labels are tightened. REITs (Link 0823, Champion
  # 2778, Yuexiu 0405, etc.) are still missing from the universe — known gap
  # documented in CLAUDE.md (requires parsing a separate HKEX xlsx sheet).
  Real Estate - Development:               Real Estate Developers
  Real Estate Services:                    Property Management & Services
  Real Estate - Diversified:               Diversified Real Estate

  # ---- Basic Materials (8 sub-sectors covering 13 yf_industry values) ----
  # Mining split into precious vs base (gold tracks USD/rates; base metals
  # track industrial demand). Chemicals merged (commodity + specialty).
  # Lumber + Paper merged into forest products. Building materials kept in
  # Basic Materials as raw-commodity bucket; Conch + CNBM already promoted
  # to Industrials/Building Products & Equipment via ticker_overrides.
  Other Industrial Metals & Mining:        Base Metals & Mining
  Copper:                                  Base Metals & Mining
  Aluminum:                                Base Metals & Mining
  Gold:                                    Precious Metals & Mining
  Other Precious Metals & Mining:          Precious Metals & Mining
  Chemicals:                               Chemicals
  Specialty Chemicals:                     Chemicals
  Building Materials:                      Building Materials & Cement
  Steel:                                   Steel
  Lumber & Wood Production:                Forest Products & Paper
  Paper & Paper Products:                  Forest Products & Paper
  Coking Coal:                             Coking Coal
  Agricultural Inputs:                     Agricultural Inputs

# ============================================================================
# ticker_overrides — per-ticker promotions, demotions, and renames
# ============================================================================
# Use sparingly. Two main use cases:
#   A. Cross-sector promotion (parent_sector override): pull a ticker out of
#      its yfinance parent sector into a different one — e.g. EV makers
#      promoted from Consumer Cyclical into Technology.
#   B. Sub-sector override (sub_sector field): override the industry-mapping
#      default — e.g. the 6 internet giants get pulled out of the generic
#      Application Software bucket and into Platforms & Cloud Infrastructure.

ticker_overrides:
  # --------------------------------------------------------------------------
  # Auto Tech promotions (Consumer Cyclical → Technology)
  # --------------------------------------------------------------------------
  # 10 most prominent EV / legacy-auto names. Smaller listed auto manufacturers
  # (Brilliance, Power Xinchen, Yadea, Voyah, etc.) stay in Consumer Cyclical.
  # Auto Parts not promoted — line between "auto tech" and "auto parts" is
  # genuinely blurry (battery makers? braking systems?); revisit if needed.
  1211.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # BYD
  0175.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # Geely
  2015.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # Li Auto
  9866.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # NIO
  9868.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # XPeng
  9863.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # Leapmotor
  9973.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # Chery
  9927.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # Seres
  2238.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # GAC Group
  2333.HK: { parent_sector: Technology, sub_sector: Auto Tech }   # Great Wall Motor

  # --------------------------------------------------------------------------
  # Solar demotions (Technology → Energy)
  # --------------------------------------------------------------------------
  # The Solar industry mapping above already assigns sub_sector=Clean Energy;
  # these overrides flip parent_sector so they leave the Technology peer pool.
  0438.HK: { parent_sector: Energy }
  0712.HK: { parent_sector: Energy }
  0750.HK: { parent_sector: Energy }
  0757.HK: { parent_sector: Energy }
  0968.HK: { parent_sector: Energy }   # Xinyi Solar
  1421.HK: { parent_sector: Energy }
  1799.HK: { parent_sector: Energy }
  2865.HK: { parent_sector: Energy }
  3800.HK: { parent_sector: Energy }   # GCL-Poly
  6865.HK: { parent_sector: Energy }
  8111.HK: { parent_sector: Energy }

  # --------------------------------------------------------------------------
  # Internet giants — pull 6 names out of generic Application Software and
  # into the merged Platforms & Cloud Infrastructure bucket. They all run
  # major cloud arms (Tencent Cloud, AliCloud, Baidu Cloud) and share
  # SaaS/usage-based economics with the pure infra-software names.
  #
  # `parent_sector: Technology` overrides yfinance's classification — yf
  # puts Tencent/Baidu/NetEase under "Communication Services" and
  # Alibaba/JD/Meituan under "Consumer Cyclical" (Internet Content /
  # Internet Retail industries). Forcing the parent to Technology means
  # they appear in Tech peer pools at the parent level too, not just at
  # the sub-sector level.
  # --------------------------------------------------------------------------
  0700.HK: { parent_sector: Technology, sub_sector: Platforms & Cloud Infrastructure }   # Tencent
  9988.HK: { parent_sector: Technology, sub_sector: Platforms & Cloud Infrastructure }   # Alibaba
  9618.HK: { parent_sector: Technology, sub_sector: Platforms & Cloud Infrastructure }   # JD.com
  3690.HK: { parent_sector: Technology, sub_sector: Platforms & Cloud Infrastructure }   # Meituan
  9999.HK: { parent_sector: Technology, sub_sector: Platforms & Cloud Infrastructure }   # NetEase
  9888.HK: { parent_sector: Technology, sub_sector: Platforms & Cloud Infrastructure }   # Baidu

  # --------------------------------------------------------------------------
  # Building Products promotion (Basic Materials → Industrials)
  # Cement / cementitious products are conceptually building products and
  # share project-cycle / infrastructure-spend exposure with the Engineering
  # & Construction names they sell to. Same cross-sector promotion pattern
  # used for BYD → Auto Tech.
  # --------------------------------------------------------------------------
  0914.HK: { parent_sector: Industrials, sub_sector: Building Products & Equipment }   # Anhui Conch Cement
  3323.HK: { parent_sector: Industrials, sub_sector: Building Products & Equipment }   # CNBM

  # --------------------------------------------------------------------------
  # Residential Construction promotion (Consumer Cyclical → Industrials)
  # The lone HK ticker yfinance classifies as Residential Construction is
  # economically a builder, not a consumer-cyclical retailer/manufacturer.
  # Slot it into the existing 163-name Engineering & Construction peer pool.
  # --------------------------------------------------------------------------
  3708.HK: { parent_sector: Industrials, sub_sector: Engineering & Construction }   # World Digi Econ (yf classifies as Residential Construction)


