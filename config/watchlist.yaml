settings:
  default_scrape_interval_minutes: 30
  max_articles_per_source: 50
  sentiment_history_days: 90

# Each entry has a ticker (for yfinance price data), a name, and aliases used to
# match articles that mention the company without the ticker symbol.
#
# Optional `sub_sector` field per entry overrides the yf_industry-based
# mapping in config/sub_sectors.yaml (highest-priority winner in the
# resolution chain). Use it when the watchlist's editorial classification
# differs from yfinance's bucket — e.g. the 6 internet giants below are
# "Software - Application" in yfinance but live in Platforms & Cloud
# Infrastructure in our taxonomy.
sectors:
  Platforms & Cloud Infrastructure:
    - ticker: "9988.HK"
      name: "Alibaba"
      sub_sector: "Platforms & Cloud Infrastructure"
      aliases: ["Taobao", "Tmall", "Alipay", "Alibaba Group", "AliCloud", "Alibaba Cloud"]
    - ticker: "9618.HK"
      name: "JD.com"
      sub_sector: "Platforms & Cloud Infrastructure"
      aliases: ["JD", "Jingdong", "JD Logistics", "JD Health"]
