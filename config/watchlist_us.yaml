      name: "Procter & Gamble"
      aliases: ["P&G", "Procter and Gamble"]
    - ticker: "KO"
      name: "Coca-Cola"
      aliases: ["Coke", "Coca Cola"]
    - ticker: "PEP"
      name: "PepsiCo"
      aliases: ["Pepsi", "Frito-Lay"]

  Media & Entertainment:
    - ticker: "NFLX"
      name: "Netflix"
      aliases: ["Netflix Inc"]
    - ticker: "DIS"
      name: "Disney"
      aliases: ["Walt Disney", "Disney+", "ESPN", "Marvel", "Lucasfilm"]

  Telecom Services:
    - ticker: "T"
      name: "AT&T"
      aliases: ["AT&T Inc"]
    - ticker: "VZ"
      name: "Verizon"
      aliases: ["Verizon Communications"]

  Aerospace & Defense:
    - ticker: "BA"
      name: "Boeing"
      aliases: ["Boeing Company", "737 MAX", "Dreamliner"]
    - ticker: "RTX"
      name: "RTX Corp"
      aliases: ["Raytheon", "RTX Corporation", "Pratt & Whitney"]
    - ticker: "LMT"
      name: "Lockheed Martin"
      aliases: ["Lockheed", "F-35"]

  Conglomerates:
